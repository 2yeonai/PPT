<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>따오 발표 연습기</title>
  <style>
    *{box-sizing:border-box} body{margin:0;padding:18px;background:#fcf9f2;color:#222;font-family:'Malgun Gothic','맑은 고딕',sans-serif} .app{max-width:1180px;margin:0 auto;background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 18px rgba(0,0,0,.08)} h1{margin:0 0 14px;text-align:center;color:#e75b4c;font-size:26px}.modebar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}.modebar button,.btn{border:0;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer;background:#2c5e3b;color:#fff}.modebar button{background:#fdf2f0;color:#444}.modebar button.active{background:#e75b4c;color:#fff}.topbar{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;background:#fff9e6;border:2px solid #ffeeba;border-radius:12px;padding:10px;margin-bottom:12px}.timer{font-size:32px;font-weight:900;color:#d9534f;font-variant-numeric:tabular-nums}.smallbtn{padding:7px 10px;font-size:14px}.green{background:#2c5e3b}.red{background:#e75b4c}.blue{background:#007bff}.gray{background:#666}.purple{background:#8e44ad}.screen{display:none}.screen.active{display:block}.practice-grid{display:grid;grid-template-columns:42% 58%;gap:16px;align-items:start}.slide-panel,.prompter-panel,.qna-panel{border-radius:14px;background:#f7f7f7;border:1px solid #e5e5e5;padding:12px}.control-row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:10px}.slide-count{font-weight:900;min-width:70px;text-align:center}.slide-img{width:100%;max-height:420px;object-fit:contain;background:#eee;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,.12)}.slide-title{display:inline-block;background:#2c5e3b;color:#fff;border-radius:999px;padding:7px 13px;font-weight:900;margin-bottom:10px}.prompter{display:flex;flex-direction:column;gap:12px}.line{border-radius:14px;padding:17px 18px;line-height:1.55;word-break:keep-all}.prev,.next{background:#f3f3f3;color:#666;opacity:.45;border:1px solid #ddd;font-size:20px;min-height:3.2em}.current{background:#fff7d6;border:3px solid #e75b4c;color:#111;font-size:32px;font-weight:900;min-height:4.8em;box-shadow:0 6px 16px rgba(231,91,76,.14)}.status{text-align:center;margin-top:10px;font-weight:900;color:#2c5e3b;background:#eef7f0;border-radius:999px;padding:7px}.hint{text-align:center;color:#777;font-size:14px;margin-top:6px}.history{max-height:54px;overflow:auto;font-size:13px;color:#555;margin:0;padding-left:20px}.qbox{background:#fff;border-radius:14px;padding:18px;margin:12px 0;border-left:6px solid #e75b4c;font-size:22px;font-weight:900;line-height:1.55}.abox{display:none;background:#eef7f0;border-radius:14px;padding:18px;margin-top:12px;border-left:6px solid #2c5e3b;font-size:20px;line-height:1.7}.badge{display:inline-block;border-radius:999px;padding:6px 12px;color:#fff;background:#666;font-weight:900}.progress{text-align:right;color:#777;font-weight:900}.error{background:#fff0f0;border:2px solid #e75b4c;color:#900;border-radius:12px;padding:14px;line-height:1.6} select{padding:7px;border-radius:8px;border:1px solid #ccc;font-weight:800}@media(max-width:800px){body{padding:8px}.app{padding:10px;border-radius:10px}h1{font-size:20px}.topbar{justify-content:flex-start;gap:6px}.timer{font-size:24px}.practice-grid{display:block}.slide-panel{margin-bottom:10px;padding:8px}.prompter-panel{padding:8px}.control-row{gap:5px;margin-bottom:8px}.btn,.modebar button{padding:8px 9px;font-size:13px}.slide-img{max-height:240px}.prev,.next{font-size:16px;min-height:2.7em;padding:12px}.current{font-size:23px;min-height:4.2em;padding:14px}.qbox{font-size:19px}.abox{font-size:17px}}
  </style>
</head>
<body>
  <div class="app">
    <h1>🌱 따오 발표 연습기</h1>
    <div class="modebar">
      <button id="modePractice" class="active" onclick="setMode('practice')">발표 10분 연습</button>
      <button id="modeQna" onclick="setMode('qna')">일반 Q&A 연습</button>
      <button id="modePressure" onclick="setMode('pressure')">압박 심사위원 모드</button>
    </div>
    <div class="topbar">
      <strong>타이머</strong><span id="time" class="timer">00:00</span>
      <button class="btn smallbtn red" onclick="startTimer()">▶</button>
      <button class="btn smallbtn blue" onclick="pauseTimer()">⏸</button>
      <button class="btn smallbtn green" onclick="saveTimer()">💾</button>
      <button class="btn smallbtn gray" onclick="resetTimer()">초기화</button>
      <strong>읽기속도</strong><select id="ttsRate"><option value="0.8">0.8배</option><option value="1" selected>1배</option><option value="1.2">1.2배</option><option value="1.5">1.5배</option></select>
      <ul id="history" class="history"></ul>
    </div>
    <div id="errorBox" class="error" style="display:none"></div>
    <section id="practiceScreen" class="screen active">
      <div class="practice-grid">
        <div class="slide-panel">
          <div class="control-row">
            <button class="btn green" onclick="prevSlide()">◀ 이전</button><span id="slideCount" class="slide-count">1 / 12</span><button class="btn green" onclick="nextSlide()">다음 ▶</button>
          </div>
          <div class="control-row">
            <button class="btn red" onclick="startPrompter()">▶ 3줄 대본 시작</button>
            <button class="btn green" onclick="prevLine()">◀ 이전 문장</button>
            <button class="btn green" onclick="nextLine()">다음 문장 ▶</button>
            <button class="btn gray" onclick="resetPrompter()">🔙 처음으로</button>
            <button class="btn blue" onclick="speakCurrentLine()">🔊 현재 문장 듣기</button>
          </div>
          <img id="slideImg" class="slide-img" src="슬라이드0001.jpg" alt="슬라이드" />
        </div>
        <div class="prompter-panel">
          <div id="slideTitle" class="slide-title">대본 로딩 중</div>
          <div class="prompter">
            <div id="prevText" class="line prev">이전 문장 없음</div>
            <div id="currentText" class="line current">script.json을 불러오는 중입니다.</div>
            <div id="nextText" class="line next">다음 문장 없음</div>
          </div>
          <div id="lineStatus" class="status">문장 0 / 0</div>
          <div class="hint">스페이스바·오른쪽 방향키: 다음 문장 / 왼쪽 방향키: 이전 문장</div>
        </div>
      </div>
    </section>
    <section id="qnaScreen" class="screen">
      <div class="qna-panel">
        <div id="progressNormal" class="progress">Q&A 로딩 중</div>
        <span id="badgeNormal" class="badge">질문 대기 중</span>
        <div id="questionNormal" class="qbox">랜덤 질문 받기를 눌러주세요.</div>
        <div class="control-row"><button class="btn green" onclick="nextQuestion('normal')">🔄 랜덤 질문 받기</button><button class="btn blue" onclick="speakQuestion('normal')">🔊 질문 듣기</button><button class="btn red" onclick="showAnswer('normal')">💡 답변 확인</button><button class="btn gray" onclick="resetQna('normal')">🔁 초기화</button></div>
        <div id="answerNormal" class="abox"></div>
      </div>
    </section>
    <section id="pressureScreen" class="screen">
      <div class="qna-panel">
        <div id="progressPressure" class="progress">압박 Q&A 로딩 중</div>
        <span id="badgePressure" class="badge">압박 대기 중</span>
        <div id="questionPressure" class="qbox">압박 질문 받기를 눌러주세요.</div>
        <div class="control-row"><button class="btn purple" onclick="nextQuestion('pressure')">🔥 압박 질문 받기</button><button class="btn blue" onclick="speakQuestion('pressure')">🔊 질문 듣기</button><button class="btn red" onclick="showAnswer('pressure')">💡 답변 확인</button><button class="btn gray" onclick="resetQna('pressure')">🔁 초기화</button></div>
        <div id="answerPressure" class="abox"></div>
      </div>
    </section>
  </div>
<script>
let scripts=[], qnas=[], slideIndex=0, lineIndex=0, timer=null, seconds=0, currentQ={normal:null, pressure:null}, pool={normal:[], pressure:[]};
function el(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}
async function loadData(){try{const [s,q]=await Promise.all([fetch('script.json?ver='+Date.now(),{cache:'no-store'}),fetch('qna.json?ver='+Date.now(),{cache:'no-store'})]); if(!s.ok||!q.ok) throw new Error('json file not found'); scripts=await s.json(); qnas=await q.json(); renderSlide(); resetQna('normal'); resetQna('pressure'); loadHistory();}catch(e){el('errorBox').style.display='block';el('errorBox').innerText='script.json 또는 qna.json을 불러오지 못했습니다. index.html, script.json, qna.json이 같은 위치에 있는지 확인해 주세요.';console.error(e)}}
function lines(){return (scripts[slideIndex]?.script||[]).filter(v=>String(v).trim()!=='')}
function renderSlide(){if(!scripts.length)return; const s=scripts[slideIndex]; const ls=lines(); if(lineIndex<0)lineIndex=0; if(lineIndex>=ls.length)lineIndex=ls.length-1; el('slideImg').src=s.imgSrc||`슬라이드${String(slideIndex+1).padStart(4,'0')}.jpg`; el('slideTitle').innerText=s.title||`[S${slideIndex+1}]`; el('slideCount').innerText=`${slideIndex+1} / ${scripts.length}`; el('prevText').innerText=ls[lineIndex-1]||'이전 문장 없음'; el('currentText').innerText=ls[lineIndex]||'대본 없음'; el('nextText').innerText=ls[lineIndex+1]||'다음 문장 없음'; el('lineStatus').innerText=`문장 ${ls.length?lineIndex+1:0} / ${ls.length}`}
function prevSlide(){if(slideIndex>0){slideIndex--; lineIndex=0; stopSpeech(); renderSlide()}}
function nextSlide(){if(slideIndex<scripts.length-1){slideIndex++; lineIndex=0; stopSpeech(); renderSlide()}}
function startPrompter(){startTimer(); lineIndex=0; renderSlide()}
function nextLine(){const ls=lines(); if(lineIndex<ls.length-1){lineIndex++; renderSlide(); return} if(slideIndex<scripts.length-1){slideIndex++; lineIndex=0; renderSlide(); return} finishPractice()}
function prevLine(){if(lineIndex>0){lineIndex--; renderSlide(); return} if(slideIndex>0){slideIndex--; lineIndex=Math.max(lines().length-1,0); renderSlide()}}
function resetPrompter(){stopSpeech(); if(seconds>0 && !confirm('대본 위치를 처음으로 되돌립니다. 타이머도 초기화할까요?')){slideIndex=0; lineIndex=0; renderSlide(); return} slideIndex=0; lineIndex=0; resetTimer(); renderSlide()}
function formatTime(v){const m=String(Math.floor(v/60)).padStart(2,'0'), s=String(v%60).padStart(2,'0'); return `${m}:${s}`}
function updateTime(){el('time').innerText=formatTime(seconds); el('time').style.color=seconds>=600?'#e75b4c':'#d9534f'}
function startTimer(){if(timer)return; timer=setInterval(()=>{seconds++; updateTime()},1000)}
function pauseTimer(){if(timer){clearInterval(timer); timer=null}}
function resetTimer(){pauseTimer(); seconds=0; updateTime()}
function saveTimer(){pauseTimer(); if(seconds<30){alert('30초 미만 연습은 기록하지 않습니다.'); return} const rec=`${new Date().toLocaleTimeString()} / 발표 ${formatTime(seconds)}`; const arr=JSON.parse(localStorage.getItem('records')||'[]'); arr.unshift(rec); localStorage.setItem('records',JSON.stringify(arr.slice(0,8))); seconds=0; updateTime(); loadHistory()}
function finishPractice(){pauseTimer(); if(seconds<30){alert('발표가 끝났습니다. 30초 미만이라 기록하지 않습니다.'); resetTimer(); return} if(confirm('발표가 끝났습니다. 기록을 저장할까요?')) saveTimer(); else resetTimer()}
function loadHistory(){const arr=JSON.parse(localStorage.getItem('records')||'[]'); el('history').innerHTML=arr.map(r=>`<li>${esc(r)}</li>`).join('')}
function stopSpeech(){try{speechSynthesis.cancel()}catch(e){}}
function speak(text){if(!text)return; stopSpeech(); const u=new SpeechSynthesisUtterance(String(text)); u.lang='ko-KR'; u.rate=parseFloat(el('ttsRate').value||'1'); speechSynthesis.speak(u)}
function speakCurrentLine(){speak(lines()[lineIndex]||'')}
function setMode(mode){['Practice','Qna','Pressure'].forEach(v=>{el('mode'+v).classList.remove('active')}); ['practiceScreen','qnaScreen','pressureScreen'].forEach(id=>el(id).classList.remove('active')); if(mode==='practice'){el('modePractice').classList.add('active');el('practiceScreen').classList.add('active')} if(mode==='qna'){el('modeQna').classList.add('active');el('qnaScreen').classList.add('active')} if(mode==='pressure'){el('modePressure').classList.add('active');el('pressureScreen').classList.add('active')} stopSpeech()}
function answerHtml(q){let parts=[]; if(q.judge_intent)parts.push(`(심사위원 의도: ${esc(q.judge_intent)})`); if(q.directing)parts.push(`[디렉팅: ${esc(q.directing)}]`); if(q.answer)parts.push(esc(q.answer)); if(q.keywords)parts.push(`[키워드] ${esc(q.keywords)}`); if(q.answer_direction)parts.push(`[답변 방향] ${esc(q.answer_direction)}`); return parts.join('<br><br>')}
function resetQna(mode){if(mode==='normal'){pool.normal=[...qnas]; currentQ.normal=null; el('progressNormal').innerText=`남은 질문: ${pool.normal.length}개 / 전체 ${qnas.length}개`; el('badgeNormal').innerText='질문 대기 중'; el('questionNormal').innerText='랜덤 질문 받기를 눌러주세요.'; el('answerNormal').style.display='none'}else{pool.pressure=qnas.filter(q=>q.level==='핵심 Q&A'); currentQ.pressure=null; el('progressPressure').innerText=`남은 질문: ${pool.pressure.length}개 / 전체 ${pool.pressure.length}개`; el('badgePressure').innerText='압박 대기 중'; el('questionPressure').innerText='압박 질문 받기를 눌러주세요.'; el('answerPressure').style.display='none'}}
function nextQuestion(mode){const p=pool[mode]; if(!p.length){alert('모든 질문 연습이 끝났습니다. 초기화하세요.'); return} const i=Math.floor(Math.random()*p.length); const q=p.splice(i,1)[0]; currentQ[mode]=q; const suffix=mode==='normal'?'Normal':'Pressure'; el('badge'+suffix).innerText=q.level||'Q&A'; el('question'+suffix).innerText=`Q${q.id}. ${q.question}`; el('answer'+suffix).style.display='none'; if(mode==='normal')el('progressNormal').innerText=`남은 질문: ${p.length}개 / 전체 ${qnas.length}개`; else el('progressPressure').innerText=`남은 질문: ${p.length}개 / 전체 ${qnas.filter(x=>x.level==='핵심 Q&A').length}개`}
function showAnswer(mode){const q=currentQ[mode]; if(!q){alert('먼저 질문을 받아주세요.'); return} const id=mode==='normal'?'answerNormal':'answerPressure'; const box=el(id); if(box.style.display==='block'){box.style.display='none'; return} box.innerHTML=answerHtml(q); box.style.display='block'}
function speakQuestion(mode){const q=currentQ[mode]; if(q)speak(q.question)}
document.addEventListener('keydown',e=>{if(document.activeElement&&['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return; if(el('practiceScreen').classList.contains('active')){if(e.code==='Space'||e.key==='ArrowRight'){e.preventDefault();nextLine()} if(e.key==='ArrowLeft'){e.preventDefault();prevLine()}}});
window.addEventListener('load',loadData);
</script>
</body>
</html>
