<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>따오 발표 연습기</title>
  <style>
    *{box-sizing:border-box} body{margin:0;padding:18px;background:#fcf9f2;color:#222;font-family:'Malgun Gothic','맑은 고딕',sans-serif} .app{max-width:1180px;margin:0 auto;background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 18px rgba(0,0,0,.08)} h1{margin:0 0 14px;text-align:center;color:#e75b4c;font-size:26px}.modebar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}.modebar button,.btn{border:0;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer;background:#2c5e3b;color:#fff}.modebar button{background:#fdf2f0;color:#444}.modebar button.active{background:#e75b4c;color:#fff}.topbar{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;background:#fff9e6;border:2px solid #ffeeba;border-radius:12px;padding:10px;margin-bottom:12px}.timer{font-size:32px;font-weight:900;color:#d9534f;font-variant-numeric:tabular-nums}.smallbtn{padding:7px 10px;font-size:14px}.iconbtn{width:42px;height:38px;padding:0;font-size:18px;display:inline-flex;align-items:center;justify-content:center}.green{background:#2c5e3b}.red{background:#e75b4c}.blue{background:#007bff}.gray{background:#666}.purple{background:#8e44ad}.orange{background:#f0ad4e;color:#222}.screen{display:none}.screen.active{display:block}.practice-grid{display:grid;grid-template-columns:42% 58%;gap:16px;align-items:start}.slide-panel,.prompter-panel,.qna-panel{border-radius:14px;background:#f7f7f7;border:1px solid #e5e5e5;padding:12px}.control-row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:10px}.slide-count{font-weight:900;min-width:70px;text-align:center}.slide-img{width:100%;max-height:420px;object-fit:contain;background:#eee;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,.12)}.slide-title{display:inline-block;background:#2c5e3b;color:#fff;border-radius:999px;padding:7px 13px;font-weight:900;margin-bottom:10px}.prompter{display:flex;flex-direction:column;gap:10px}.line{border-radius:14px;padding:15px 17px;line-height:1.55;word-break:keep-all}.scroll-line{background:#fff;border:1px solid #ddd;color:#222;font-size:24px;font-weight:800;min-height:3.8em;display:flex;align-items:center}.scroll-line.active{background:#fff7d6;border:3px solid #e75b4c;color:#111;box-shadow:0 6px 16px rgba(231,91,76,.14)}body.prompter-running .scroll-line.active{animation:blinkLine 1s infinite}@keyframes blinkLine{0%,100%{box-shadow:0 0 0 rgba(231,91,76,0);transform:scale(1)}50%{box-shadow:0 0 18px rgba(231,91,76,.55);transform:scale(1.01)}}.status{text-align:center;margin-top:10px;font-weight:900;color:#2c5e3b;background:#eef7f0;border-radius:999px;padding:7px}.hint{text-align:center;color:#777;font-size:14px;margin-top:6px}.history{max-height:54px;overflow:auto;font-size:13px;color:#555;margin:0;padding-left:20px}.qbox{background:#fff;border-radius:14px;padding:18px;margin:12px 0;border-left:6px solid #e75b4c;font-size:22px;font-weight:900;line-height:1.55}.abox{display:none;background:#eef7f0;border-radius:14px;padding:18px;margin-top:12px;border-left:6px solid #2c5e3b;font-size:20px;line-height:1.7}.badge{display:inline-block;border-radius:999px;padding:6px 12px;color:#fff;background:#666;font-weight:900}.progress{text-align:right;color:#777;font-weight:900}.error{background:#fff0f0;border:2px solid #e75b4c;color:#900;border-radius:12px;padding:14px;line-height:1.6} select{padding:7px;border-radius:8px;border:1px solid #ccc;font-weight:800}.required-box{margin-top:18px;background:#fff;border:1px solid #ddd;border-radius:14px;overflow:hidden}.required-box summary{cursor:pointer;padding:14px 16px;background:#fff7d6;font-weight:900;color:#2c5e3b}.required-list{padding:14px 16px}.required-item{border-bottom:1px dashed #ddd;padding:12px 0}.required-item:last-child{border-bottom:0}.required-q{font-weight:900;color:#e75b4c;margin-bottom:8px}.required-a{line-height:1.65;white-space:pre-wrap}.mini{font-size:13px;color:#666;margin-top:5px}@media(max-width:800px){body{padding:8px}.app{padding:10px;border-radius:10px}h1{font-size:20px}.topbar{justify-content:flex-start;gap:6px}.timer{font-size:24px}.practice-grid{display:block}.slide-panel{margin-bottom:10px;padding:8px}.prompter-panel{padding:8px}.control-row{gap:5px;margin-bottom:8px}.btn,.modebar button{padding:8px 9px;font-size:13px}.iconbtn{width:36px;height:34px;padding:0;font-size:16px}.slide-img{max-height:240px}.scroll-line{font-size:19px;min-height:3.5em;padding:12px}.qbox{font-size:19px}.abox{font-size:17px}}
  </style>
</head>
<body>
  <div class="app">
    <h1>🌱 따오 발표 연습기</h1>
    <div class="modebar">
      <button id="modePractice" class="active" onclick="setMode('practice')">발표 10분 연습</button>
      <button id="modeQna" onclick="setMode('qna')">Q&A 연습</button>
      <button id="modePressure" onclick="setMode('pressure')">압박 심사위원 모드</button>
    </div>
    <div class="topbar">
      <strong>타이머</strong><span id="time" class="timer">00:00</span>
      <button class="btn smallbtn red" onclick="startTimer()">▶</button>
      <button class="btn smallbtn blue" onclick="pauseTimer()">⏸</button>
      <button class="btn smallbtn green" onclick="saveTimer()">💾</button>
      <button class="btn smallbtn gray" onclick="resetTimer()">초기화</button>
      <strong>읽기속도</strong><select id="ttsRate"><option value="0.8">0.8배</option><option value="1" selected>1배</option><option value="1.2">1.2배</option><option value="1.5">1.5배</option></select>
      <strong>스크롤</strong><select id="scrollSpeed"><option value="5500">천천히</option><option value="4300" selected>보통</option><option value="3200">빠르게</option></select>
      <ul id="history" class="history"></ul>
    </div>
    <div id="errorBox" class="error" style="display:none"></div>
    <section id="practiceScreen" class="screen active">
      <div class="practice-grid">
        <div class="slide-panel">
          <div class="control-row">
            <button class="btn green" onclick="prevSlide()">◀ 이전</button><span id="slideCount" class="slide-count">1 / 12</span><button class="btn green" onclick="nextSlide()">다음 ▶</button>
          </div>
          <div class="control-row">
            <strong>대본</strong>
            <button class="btn red iconbtn" title="대본시작" onclick="startPrompter()">▶</button>
            <button class="btn blue iconbtn" title="일시정지" onclick="pausePrompter()">⏸</button>
            <button class="btn green iconbtn" title="재생" onclick="resumePrompter()">⏵</button>
            <button class="btn gray iconbtn" title="처음으로" onclick="resetPrompter()">🔙</button>
            <button class="btn blue" onclick="startFullRead()">🔊 전체 문장 읽기</button>
            <button class="btn gray iconbtn" title="음성 정지" onclick="stopFullRead()">■</button>
          </div>
          <div class="control-row">
            <button class="btn green" onclick="prevLine()">◀ 이전 3줄</button>
            <button class="btn green" onclick="nextLine()">다음 3줄 ▶</button>
          </div>
          <img id="slideImg" class="slide-img" src="슬라이드0001.jpg" alt="슬라이드" />
        </div>
        <div class="prompter-panel">
          <div id="slideTitle" class="slide-title">대본 로딩 중</div>
          <div class="prompter">
            <div id="line1" class="line scroll-line active">script.json을 불러오는 중입니다.</div>
            <div id="line2" class="line scroll-line">다음 줄</div>
            <div id="line3" class="line scroll-line">다음 줄</div>
          </div>
          <div id="lineStatus" class="status">줄 0 / 0</div>
          <div class="hint">대본 자동 스크롤과 전체 문장 읽기는 슬라이드 위치와 함께 이동합니다.</div>
        </div>
      </div>
    </section>
    <section id="qnaScreen" class="screen">
      <div class="qna-panel">
        <div class="control-row"><button class="btn blue" onclick="startJudgeMode('normal')">🧑‍⚖️ 심사위원 모드 시작</button><button class="btn gray" onclick="stopJudgeMode('normal')">⏸ 모드 정지</button></div>
        <div id="progressNormal" class="progress">Q&A 로딩 중</div>
        <span id="badgeNormal" class="badge">질문 대기 중</span>
        <div id="questionNormal" class="qbox">랜덤 질문 받기를 눌러주세요.</div>
        <div class="control-row"><button class="btn green" onclick="nextQuestion('normal')">🔄 랜덤 질문 받기</button><button class="btn blue" onclick="speakQuestion('normal')">🔊 브라우저가 질문 읽기</button><button class="btn red" onclick="showAnswer('normal')">💡 답변 확인</button><button class="btn gray" onclick="resetQna('normal')">🔁 초기화</button></div>
        <div id="answerNormal" class="abox"></div>
        <div id="requiredNormal"></div>
      </div>
    </section>
    <section id="pressureScreen" class="screen">
      <div class="qna-panel">
        <div class="control-row"><button class="btn purple" onclick="startJudgeMode('pressure')">🔥 압박 심사위원 모드 시작</button><button class="btn gray" onclick="stopJudgeMode('pressure')">⏸ 모드 정지</button></div>
        <div id="progressPressure" class="progress">압박 Q&A 로딩 중</div>
        <span id="badgePressure" class="badge">압박 대기 중</span>
        <div id="questionPressure" class="qbox">압박 질문 받기를 눌러주세요.</div>
        <div class="control-row"><button class="btn purple" onclick="nextQuestion('pressure')">🔥 압박 질문 받기</button><button class="btn blue" onclick="speakQuestion('pressure')">🔊 브라우저가 질문 읽기</button><button class="btn red" onclick="showAnswer('pressure')">💡 답변 확인</button><button class="btn gray" onclick="resetQna('pressure')">🔁 초기화</button></div>
        <div id="answerPressure" class="abox"></div>
        <div id="requiredPressure"></div>
      </div>
    </section>
  </div>
<script>
let scripts=[], qnas=[], flatLines=[], flatIndex=0, timer=null, autoPrompter=null, seconds=0, currentQ={normal:null, pressure:null}, pool={normal:[], pressure:[]}, judgeMode={normal:false, pressure:false}, readingAll=false, readToken=0;
function el(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}
async function loadData(){try{const [s,q]=await Promise.all([fetch('script.json?ver='+Date.now(),{cache:'no-store'}),fetch('qna.json?ver='+Date.now(),{cache:'no-store'})]); if(!s.ok||!q.ok) throw new Error('json file not found'); scripts=await s.json(); qnas=await q.json(); buildFlatLines(); renderSlide(); resetQna('normal'); resetQna('pressure'); renderRequiredQuestions(); loadHistory();}catch(e){el('errorBox').style.display='block';el('errorBox').innerText='script.json 또는 qna.json을 불러오지 못했습니다. index.html, script.json, qna.json이 같은 위치에 있는지 확인해 주세요.';console.error(e)}}
function buildFlatLines(){flatLines=[]; scripts.forEach((s,si)=>{(s.script||[]).forEach(line=>{if(String(line).trim())flatLines.push({text:String(line).trim(), slideIndex:si, title:s.title||`[S${si+1}]`, imgSrc:s.imgSrc})})}); flatIndex=0}
function currentFlat(){return flatLines[flatIndex]||null}
function renderSlide(){if(!scripts.length||!flatLines.length)return; const cur=currentFlat()||flatLines[0]; if(cur){el('slideImg').src=cur.imgSrc||`슬라이드${String(cur.slideIndex+1).padStart(4,'0')}.jpg`; el('slideTitle').innerText=cur.title; el('slideCount').innerText=`${cur.slideIndex+1} / ${scripts.length}`;} el('line1').innerText=flatLines[flatIndex]?.text||'대본 없음'; el('line2').innerText=flatLines[flatIndex+1]?.text||'다음 줄 없음'; el('line3').innerText=flatLines[flatIndex+2]?.text||'다음 줄 없음'; el('lineStatus').innerText=`줄 ${Math.min(flatIndex+1,flatLines.length)} / ${flatLines.length}`}
function prevSlide(){const cur=currentFlat(); if(!cur)return; const target=Math.max(cur.slideIndex-1,0); const idx=flatLines.findIndex(x=>x.slideIndex===target); if(idx>=0){flatIndex=idx; renderSlide()}}
function nextSlide(){const cur=currentFlat(); if(!cur)return; const target=Math.min(cur.slideIndex+1,scripts.length-1); const idx=flatLines.findIndex(x=>x.slideIndex===target); if(idx>=0){flatIndex=idx; renderSlide()}}
function setPrompterBlink(on){document.body.classList.toggle('prompter-running',!!on)}
function startPrompter(){stopFullRead(); pausePrompter(); flatIndex=0; startTimer(); renderSlide(); setPrompterBlink(true); autoPrompter=setInterval(()=>nextLine(true),parseInt(el('scrollSpeed').value||'4300',10))}
function pausePrompter(){if(autoPrompter){clearInterval(autoPrompter); autoPrompter=null} setPrompterBlink(false)}
function resumePrompter(){stopFullRead(); if(autoPrompter)return; if(flatIndex>=flatLines.length-1)flatIndex=0; startTimer(); setPrompterBlink(true); autoPrompter=setInterval(()=>nextLine(true),parseInt(el('scrollSpeed').value||'4300',10))}
function nextLine(auto=false){if(flatIndex<flatLines.length-1){flatIndex++; renderSlide(); return} if(auto)pausePrompter(); finishPractice()}
function prevLine(){pausePrompter(); stopFullRead(); flatIndex=Math.max(0,flatIndex-1); renderSlide()}
function resetPrompter(){pausePrompter(); stopFullRead(); flatIndex=0; resetTimer(); renderSlide()}
function startFullRead(){pausePrompter(); readToken++; readingAll=true; setPrompterBlink(true); startTimer(); speakLineSequence(readToken)}
function speakLineSequence(token){if(!readingAll||token!==readToken)return; if(flatIndex>=flatLines.length){finishPractice(); return} renderSlide(); const line=flatLines[flatIndex]?.text||''; speak(line,()=>{if(!readingAll||token!==readToken)return; if(flatIndex<flatLines.length-1){flatIndex++; speakLineSequence(token)}else{readingAll=false; setPrompterBlink(false); finishPractice()}})}
function stopFullRead(){readingAll=false; readToken++; setPrompterBlink(false); stopSpeech()}
function formatTime(v){const m=String(Math.floor(v/60)).padStart(2,'0'), s=String(v%60).padStart(2,'0'); return `${m}:${s}`}
function updateTime(){el('time').innerText=formatTime(seconds); el('time').style.color=seconds>=600?'#e75b4c':'#d9534f'}
function startTimer(){if(timer)return; timer=setInterval(()=>{seconds++; updateTime()},1000)}
function pauseTimer(){if(timer){clearInterval(timer); timer=null}}
function resetTimer(){pauseTimer(); seconds=0; updateTime()}
function saveTimer(){pauseTimer(); if(seconds<30){alert('30초 미만 연습은 기록하지 않습니다.'); return} const rec=`${new Date().toLocaleTimeString()} / 발표 ${formatTime(seconds)}`; const arr=JSON.parse(localStorage.getItem('records')||'[]'); arr.unshift(rec); localStorage.setItem('records',JSON.stringify(arr.slice(0,8))); seconds=0; updateTime(); loadHistory()}
function finishPractice(){pauseTimer(); pausePrompter(); readingAll=false; setPrompterBlink(false); if(seconds<30){alert('발표가 끝났습니다. 30초 미만이라 기록하지 않습니다.'); resetTimer(); return} if(confirm('발표가 끝났습니다. 기록을 저장할까요?')) saveTimer(); else resetTimer()}
function loadHistory(){const arr=JSON.parse(localStorage.getItem('records')||'[]'); el('history').innerHTML=arr.map(r=>`<li>${esc(r)}</li>`).join('')}
function stopSpeech(){try{speechSynthesis.cancel()}catch(e){}}
function speak(text,onend){if(!text)return; stopSpeech(); const u=new SpeechSynthesisUtterance(String(text)); u.lang='ko-KR'; u.rate=parseFloat(el('ttsRate').value||'1'); if(onend)u.onend=onend; speechSynthesis.speak(u)}
function setMode(mode){pausePrompter(); stopFullRead(); ['Practice','Qna','Pressure'].forEach(v=>el('mode'+v).classList.remove('active')); ['practiceScreen','qnaScreen','pressureScreen'].forEach(id=>el(id).classList.remove('active')); if(mode==='practice'){el('modePractice').classList.add('active');el('practiceScreen').classList.add('active')} if(mode==='qna'){el('modeQna').classList.add('active');el('qnaScreen').classList.add('active')} if(mode==='pressure'){el('modePressure').classList.add('active');el('pressureScreen').classList.add('active')}}
function answerHtml(q){let parts=[]; if(q.judge_intent)parts.push(`(심사위원 의도: ${esc(q.judge_intent)})`); if(q.directing)parts.push(`[디렉팅: ${esc(q.directing)}]`); if(q.answer)parts.push(esc(q.answer)); if(q.keywords)parts.push(`[키워드] ${esc(q.keywords)}`); if(q.answer_direction)parts.push(`[답변 방향] ${esc(q.answer_direction)}`); return parts.join('<br><br>')}
function resetQna(mode){judgeMode[mode]=false; if(mode==='normal'){pool.normal=[...qnas]; currentQ.normal=null; el('progressNormal').innerText=`남은 질문: ${pool.normal.length}개 / 전체 ${qnas.length}개`; el('badgeNormal').innerText='질문 대기 중'; el('questionNormal').innerText='랜덤 질문 받기를 눌러주세요.'; el('answerNormal').style.display='none'}else{pool.pressure=qnas.filter(q=>q.level==='핵심 Q&A'); currentQ.pressure=null; el('progressPressure').innerText=`남은 질문: ${pool.pressure.length}개 / 전체 ${pool.pressure.length}개`; el('badgePressure').innerText='압박 대기 중'; el('questionPressure').innerText='압박 질문 받기를 눌러주세요.'; el('answerPressure').style.display='none'}}
function nextQuestion(mode){const p=pool[mode]; if(!p.length){alert('모든 질문 연습이 끝났습니다. 초기화하세요.'); return} const i=Math.floor(Math.random()*p.length); const q=p.splice(i,1)[0]; currentQ[mode]=q; const suffix=mode==='normal'?'Normal':'Pressure'; el('badge'+suffix).innerText=q.level||'Q&A'; el('question'+suffix).innerText=`Q${q.id}. ${q.question}`; el('answer'+suffix).style.display='none'; if(mode==='normal')el('progressNormal').innerText=`남은 질문: ${p.length}개 / 전체 ${qnas.length}개`; else el('progressPressure').innerText=`남은 질문: ${p.length}개 / 전체 ${qnas.filter(x=>x.level==='핵심 Q&A').length}개`; if(judgeMode[mode])setTimeout(()=>speakQuestion(mode),250)}
function showAnswer(mode){const q=currentQ[mode]; if(!q){alert('먼저 질문을 받아주세요.'); return} const id=mode==='normal'?'answerNormal':'answerPressure'; const box=el(id); if(box.style.display==='block'){box.style.display='none'; return} box.innerHTML=answerHtml(q); box.style.display='block'}
function speakQuestion(mode){const q=currentQ[mode]; if(q)speak(q.question)}
function startJudgeMode(mode){judgeMode[mode]=true; if(mode==='normal'){speak('지금부터 심사위원 모드를 시작합니다. 질문을 듣고 바로 답변해 보세요.',()=>nextQuestion('normal'))}else{speak('지금부터 압박 심사위원 모드를 시작합니다. 질문을 듣고 바로 답변해 보세요.',()=>nextQuestion('pressure'))}}
function stopJudgeMode(mode){judgeMode[mode]=false; stopSpeech()}
function renderRequiredQuestions(){const core=qnas.filter(q=>q.level==='핵심 Q&A').slice(0,5); const html=`<details class="required-box"><summary>✅ 필수질문 5개 펼쳐보기</summary><div class="required-list">${core.map(q=>`<div class="required-item"><div class="required-q">Q${q.id}. ${esc(q.question)}</div><div class="mini">${q.judge_intent?esc('(심사위원 의도: '+q.judge_intent):''}</div><div class="required-a">${answerHtml(q).replace(/<br><br>/g,'\n\n')}</div></div>`).join('')}</div></details>`; el('requiredNormal').innerHTML=html; el('requiredPressure').innerHTML=html}
document.addEventListener('keydown',e=>{if(document.activeElement&&['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return; if(el('practiceScreen').classList.contains('active')){if(e.code==='Space'||e.key==='ArrowRight'){e.preventDefault();nextLine(false)} if(e.key==='ArrowLeft'){e.preventDefault();prevLine()}}});
window.addEventListener('load',loadData);
</script>
</body>
</html>
